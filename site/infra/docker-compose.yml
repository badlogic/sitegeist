name: sitegeist-site

services:
  web:
    image: caddy:alpine
    restart: unless-stopped
    labels:
      caddy: sitegeist.ai
      caddy.reverse_proxy: '{{upstreams 80}}'
    volumes:
      - ../dist/frontend:/srv:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - caddy-network
      - internal

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    restart: unless-stopped
    working_dir: /app
    stop_grace_period: 5s
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - NODE_ENV=production
    volumes:
      - ../data:/data
    networks:
      - internal

networks:
  caddy-network:
    external: true
  internal:
